<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirim-Chiqim Forma</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 0;
    }
    h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    /* Toggle */
    .toggle-wrap {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 22px;
    }
    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--tg-theme-hint-color, #888);
    }
    .toggle-btn.active-kirim {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      box-shadow: 0 4px 15px rgba(17,153,142,0.4);
    }
    .toggle-btn.active-chiqim {
      background: linear-gradient(135deg, #eb3349, #f45c43);
      color: #fff;
      box-shadow: 0 4px 15px rgba(235,51,73,0.4);
    }
    /* Fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-wrap {
      position: relative;
    }
    .currency-badge {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-weight: 600;
      color: #38ef7d;
      pointer-events: none;
    }
    .field input, .field textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--tg-theme-text-color, #eee);
      font-size: 18px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    #amount { padding-right: 52px; letter-spacing: 1px; }
    .field input:focus, .field textarea:focus {
      border-color: #38ef7d;
      background: rgba(255,255,255,0.10);
    }
    .field textarea {
      resize: none;
      height: 75px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 400;
    }
    .field input::placeholder, .field textarea::placeholder {
      color: rgba(255,255,255,0.2);
      font-weight: 400;
      font-size: 15px;
    }
    /* Preview */
    .preview {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-left: 3px solid #38ef7d;
      display: none;
    }
    .preview.show { display: block; }
    .preview-title {
      font-size: 11px;
      color: #666;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .preview-content {
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-line;
      font-family: monospace;
      color: #ccc;
    }
    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }
    .submit-btn.kirim {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(17,153,142,0.4);
    }
    .submit-btn.chiqim {
      background: linear-gradient(135deg, #eb3349, #f45c43);
      color: #fff;
      box-shadow: 0 6px 20px rgba(235,51,73,0.4);
    }
    .submit-btn:active { transform: scale(0.97); opacity: 0.9; }
    .error-msg {
      color: #f45c43;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <h2>💼 Kirim-Chiqim Forma</h2>
  <!-- Toggle -->
  <div class="toggle-wrap">
    <button class="toggle-btn active-kirim" id="btn-kirim"   onclick="setType('kirim')">💰 Kirim</button>
    <button class="toggle-btn"              id="btn-chiqim"  onclick="setType('chiqim')">💸 Chiqim</button>
  </div>
  <!-- Summa -->
  <div class="field">
    <label>💵 Summa (so'm)</label>
    <div class="input-wrap">
      <input
        type="text"
        id="amount"
        inputmode="numeric"
        placeholder="0"
        autocomplete="off"
        oninput="handleAmount(this)"
      />
      <span class="currency-badge">so'm</span>
    </div>
    <div class="error-msg" id="err-amount">Summani kiriting!</div>
  </div>
  <!-- Sana -->
  <div class="field">
    <label>📅 Sana</label>
    <input type="date" id="date" oninput="updatePreview()" />
  </div>
  <!-- Izoh -->
  <div class="field">
    <label>📝 Izoh (ixtiyoriy)</label>
    <textarea id="note" placeholder="Masalan: Maosh, Oziq-ovqat..." oninput="updatePreview()"></textarea>
  </div>
  <!-- Preview -->
  <div class="preview" id="preview">
    <div class="preview-title">📋 Ko'rinish:</div>
    <div class="preview-content" id="preview-content"></div>
  </div>
  <!-- Submit -->
  <button class="submit-btn kirim" id="submit-btn" onclick="submit()">✅ Kirim Yuborish</button>
<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();
  let currentType = 'kirim';
  let rawAmount   = 0; // formatlanmagan son
  // Bugungi sanani o'rnatish
  const now  = new Date();
  const yyyy = now.getFullYear();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
  // ── Tur o'zgartirish ──────────────────────────────────────────────────────
  function setType(type) {
    currentType = type;
    const btnK = document.getElementById('btn-kirim');
    const btnC = document.getElementById('btn-chiqim');
    const btn  = document.getElementById('submit-btn');
    if (type === 'kirim') {
      btnK.className = 'toggle-btn active-kirim';
      btnC.className = 'toggle-btn';
      btn.className  = 'submit-btn kirim';
      btn.textContent = '✅ Kirim Yuborish';
    } else {
      btnK.className = 'toggle-btn';
      btnC.className = 'toggle-btn active-chiqim';
      btn.className  = 'submit-btn chiqim';
      btn.textContent = '✅ Chiqim Yuborish';
    }
    updatePreview();
  }
  // ── Summani formatlash (yozayotganda) ─────────────────────────────────────
  function handleAmount(input) {
    // Faqat raqamlarni olamiz
    const digits = input.value.replace(/\D/g, '');
    rawAmount = parseInt(digits || '0', 10);
    // Bo'shliq bilan formatlash: 5000000 → "5 000 000"
    if (digits === '') {
      input.value = '';
    } else {
      input.value = rawAmount.toLocaleString('ru-RU'); // rus lokali bo'sh joy ishlatadi
    }
    // Kursor oxirida tursin
    const len = input.value.length;
    input.setSelectionRange(len, len);
    updatePreview();
  }
  // ── Sana formatlash ───────────────────────────────────────────────────────
  function formatDate(val) {
    if (!val) return '—';
    const [y, m, d] = val.split('-');
    return `${d}.${m}.${y}`;
  }
  // ── Preview yangilash ─────────────────────────────────────────────────────
  function updatePreview() {
    const date    = document.getElementById('date').value;
    const note    = document.getElementById('note').value.trim();
    const preview = document.getElementById('preview');
    const content = document.getElementById('preview-content');
    if (!rawAmount) { preview.classList.remove('show'); return; }
    const emoji = currentType === 'kirim' ? '💰' : '💸';
    const label = currentType === 'kirim' ? 'KIRIM' : 'CHIQIM';
    const tag   = currentType === 'kirim' ? '#kirim' : '#chiqim';
    content.textContent =
      `✅ ${label} QAYD ETILDI\n` +
      `━━━━━━━━━━━━━━\n` +
      `${emoji} Summa:  ${rawAmount.toLocaleString('ru-RU')} so'm\n` +
      `📅 Sana:   ${formatDate(date)}\n` +
      `📝 Izoh:   ${note || '—'}\n` +
      `━━━━━━━━━━━━━━\n` +
      `${tag}`;
    preview.classList.add('show');
  }
  // ── Yuborish ──────────────────────────────────────────────────────────────
  function submit() {
    const errAmount = document.getElementById('err-amount');
    if (!rawAmount || rawAmount <= 0) {
      errAmount.classList.add('show');
      return;
    }
    errAmount.classList.remove('show');
    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value.trim();
    tg.sendData(JSON.stringify({
      type:   currentType,
      amount: rawAmount,
      date:   formatDate(date),
      note:   note || '—'
    }));
  }
</script>
</body>
</html>
