<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirim-Chiqim Forma</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Toggle: Kirim / Chiqim */
    .toggle-wrap {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--tg-theme-hint-color, #888);
    }
    .toggle-btn.active-kirim {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      box-shadow: 0 4px 15px rgba(17,153,142,0.4);
    }
    .toggle-btn.active-chiqim {
      background: linear-gradient(135deg, #eb3349, #f45c43);
      color: #fff;
      box-shadow: 0 4px 15px rgba(235,51,73,0.4);
    }

    /* Fields */
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .field input, .field textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--tg-theme-text-color, #eee);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus {
      border-color: #38ef7d;
    }
    .field textarea {
      resize: none;
      height: 80px;
      font-family: inherit;
    }
    .field input::placeholder, .field textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    /* Preview */
    .preview {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      border-left: 3px solid #38ef7d;
      display: none;
    }
    .preview.show { display: block; }
    .preview-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .preview-content {
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-line;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: auto;
      letter-spacing: 0.3px;
    }
    .submit-btn.kirim {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(17,153,142,0.4);
    }
    .submit-btn.chiqim {
      background: linear-gradient(135deg, #eb3349, #f45c43);
      color: #fff;
      box-shadow: 0 6px 20px rgba(235,51,73,0.4);
    }
    .submit-btn:active { transform: scale(0.97); }

    .error-msg {
      color: #f45c43;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

  <h2>💼 Kirim-Chiqim Forma</h2>

  <!-- Toggle -->
  <div class="toggle-wrap">
    <button class="toggle-btn active-kirim" id="btn-kirim" onclick="setType('kirim')">💰 Kirim</button>
    <button class="toggle-btn" id="btn-chiqim" onclick="setType('chiqim')">💸 Chiqim</button>
  </div>

  <!-- Summa -->
  <div class="field">
    <label>💵 Summa (so'm)</label>
    <input type="number" id="amount" placeholder="Masalan: 500000" oninput="updatePreview()" />
    <div class="error-msg" id="err-amount">Summani kiriting!</div>
  </div>

  <!-- Sana -->
  <div class="field">
    <label>📅 Sana</label>
    <input type="date" id="date" oninput="updatePreview()" />
  </div>

  <!-- Izoh -->
  <div class="field">
    <label>📝 Izoh (ixtiyoriy)</label>
    <textarea id="note" placeholder="Masalan: Maosh, Oziq-ovqat..." oninput="updatePreview()"></textarea>
  </div>

  <!-- Preview -->
  <div class="preview" id="preview">
    <div class="preview-title">Ko'rinish:</div>
    <div class="preview-content" id="preview-content"></div>
  </div>

  <!-- Submit -->
  <button class="submit-btn kirim" id="submit-btn" onclick="submit()">✅ Kirim Yuborish</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  let currentType = 'kirim';

  // Set today's date
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

  function setType(type) {
    currentType = type;
    const btnK = document.getElementById('btn-kirim');
    const btnC = document.getElementById('btn-chiqim');
    const submitBtn = document.getElementById('submit-btn');

    if (type === 'kirim') {
      btnK.className = 'toggle-btn active-kirim';
      btnC.className = 'toggle-btn';
      submitBtn.className = 'submit-btn kirim';
      submitBtn.textContent = '✅ Kirim Yuborish';
    } else {
      btnK.className = 'toggle-btn';
      btnC.className = 'toggle-btn active-chiqim';
      submitBtn.className = 'submit-btn chiqim';
      submitBtn.textContent = '✅ Chiqim Yuborish';
    }
    updatePreview();
  }

  function formatNum(n) {
    return Number(n).toLocaleString('ru-RU');
  }

  function formatDate(val) {
    if (!val) return '—';
    const [y, m, d] = val.split('-');
    return `${d}.${m}.${y}`;
  }

  function updatePreview() {
    const amount = document.getElementById('amount').value;
    const date   = document.getElementById('date').value;
    const note   = document.getElementById('note').value.trim();
    const preview = document.getElementById('preview');
    const content = document.getElementById('preview-content');

    if (!amount) { preview.classList.remove('show'); return; }

    const emoji = currentType === 'kirim' ? '💰' : '💸';
    const tag   = currentType === 'kirim' ? '#kirim' : '#chiqim';
    const label = currentType === 'kirim' ? 'KIRIM' : 'CHIQIM';

    content.textContent =
      `✅ ${label} QAYD ETILDI\n` +
      `━━━━━━━━━━━━━━\n` +
      `${emoji} Summa:  ${formatNum(amount)} so'm\n` +
      `📅 Sana:   ${formatDate(date)}\n` +
      `📝 Izoh:   ${note || '—'}\n` +
      `━━━━━━━━━━━━━━\n` +
      `${tag}`;

    preview.classList.add('show');
  }

  function submit() {
    const amount = document.getElementById('amount').value;
    const errAmount = document.getElementById('err-amount');

    if (!amount || Number(amount) <= 0) {
      errAmount.classList.add('show');
      return;
    }
    errAmount.classList.remove('show');

    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value.trim();

    const data = {
      type:   currentType,
      amount: Number(amount),
      date:   formatDate(date),
      note:   note || '—'
    };

    tg.sendData(JSON.stringify(data));
  }
</script>
</body>
</html>
